---
- name: Test Cisco Connectivity
  hosts: all
  gather_facts: no

  vars:
    ansible_connection: network_cli
    ansible_network_os: cisco.ios.ios
    ansible_user: cisco
    ansible_password: c1sco

  tasks:
    - name: Run show version
      cisco.ios.ios_command:
        commands:
          - show version
      register: output

    - debug:
        var: output.stdout_lines
